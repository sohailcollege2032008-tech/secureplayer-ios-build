name: secure_player
description: SecurePlayer - Offline encrypted educational video platform for students.
publish_to: 'none'
version: 1.0.0+126

environment:
  sdk: '>=3.3.0 <4.0.0'
  flutter: ">=3.22.0"

dependencies:
  flutter:
    sdk: flutter

  # Firebase
  firebase_core: ^3.13.0
  firebase_auth: ^5.5.2
  cloud_functions: ^5.3.2
  firebase_crashlytics: ^4.3.0

  # Firestore is accessed via REST (lib/core/services/firestore_rest.dart),
  # not the cloud_firestore package — its Windows implementation (gRPC C++
  # SDK) crashed the app a few seconds after launch. Same fix studio_flutter
  # already applied for the identical reason.
  http: ^1.2.2

  # State management & navigation
  flutter_riverpod: ^2.6.1
  go_router: ^14.6.3

  # Security
  flutter_secure_storage: ^9.2.4
  flutter_windowmanager: ^0.2.0
  flutter_jailbreak_detection: ^1.7.0

  # Video playback
  better_player_plus: ^1.2.1

  # Local HTTP server
  shelf: ^1.4.2
  shelf_router: ^1.1.4

  # .sec file handling
  flutter_archive: ^6.0.2
  archive: ^3.6.1
  file_picker: ^8.3.3

  # Device & platform
  device_info_plus: ^10.0.0
  path_provider: ^2.1.2
  connectivity_plus: ^6.0.3

  # Teacher desktop app
  firebase_storage: ^12.3.4
  fl_chart: ^0.69.0
  cached_network_image: ^3.4.1

  # Local database
  sqflite: ^2.3.3
  shared_preferences: ^2.3.2

  # Cryptography
  pointycastle: ^3.9.1
  crypto: ^3.0.3

  # Media playback
  media_kit: ^1.1.11
  media_kit_video: ^1.2.4
  media_kit_libs_windows_video: ^1.0.9
  sqflite_common_ffi: ^2.3.4
  win32: ^5.5.0
  pdfx: ^2.6.0
  url_launcher: ^6.3.2

  # PDF generation (quiz export) — pdfx above is view-only
  pdf: ^3.11.1
  printing: ^5.13.4

  # Interactive HTML file viewer (WebView)
  webview_flutter: ^4.8.0       # Android
  webview_windows: ^0.4.0       # Windows (requires Edge WebView2 Runtime)

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0
  msix: ^3.16.7
  path_provider_platform_interface: ^2.1.2

msix_config:
  display_name: SecurePlayer
  publisher_display_name: SecurePlayer
  identity_name: com.secureplayer.app
  msix_version: 1.0.0.0
  capabilities: internetClient
  install_certificate: false

flutter:
  uses-material-design: true
  assets:
    - assets/fonts/NotoNaskhArabic-Regular.ttf
    - assets/fonts/NotoNaskhArabic-Bold.ttf
