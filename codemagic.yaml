workflows:
  ios-unsigned-build:
    name: iOS unsigned build (for Sideloadly)
    max_build_duration: 60
    instance_type: mac_mini_m2
    environment:
      # Matches the local dev machine's version for consistency.
      flutter: 3.41.9
    scripts:
      - name: Get Flutter packages
        script: flutter pub get
      - name: Install CocoaPods dependencies
        script: |
          cd ios && pod install

      # `flutter build ios --no-codesign` still enforces a Development Team
      # check for real-device (non-Simulator) targets — it only cleanly
      # skips signing for Simulator builds. This step's real job is just
      # Dart AOT compilation + plugin embedding + Xcode project prep, so its
      # own exit code is ignored; the actual unsigned build happens in the
      # next step via a direct xcodebuild invocation, which is the
      # documented, reliable way to get a real-device unsigned build.
      - name: Flutter prepare (Dart AOT + plugin embedding)
        script: |
          flutter build ios --release --no-codesign || true

      # No Apple Developer account involved at all. Sideloadly does the
      # actual signing later using whoever's own free Apple ID installs the
      # app — this only needs to produce a valid, unsigned real-device
      # binary. CONFIGURATION_BUILD_DIR pins the output to a known path
      # instead of relying on derivedData's default (unpredictable) location.
      - name: Xcode build (real device target, unsigned)
        script: |
          cd ios
          xcodebuild build \
            -workspace Runner.xcworkspace \
            -scheme Runner \
            -configuration Release \
            -sdk iphoneos \
            -destination "generic/platform=iOS" \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO \
            CONFIGURATION_BUILD_DIR="$CM_BUILD_DIR/build/ios/unsigned"

      # An .ipa is just a zip of a specific "Payload/" folder structure —
      # Sideloadly expects that exact structure, not a bare .app.
      - name: Package Runner.app into an unsigned .ipa
        script: |
          cd build/ios/unsigned
          mkdir -p Payload
          cp -r Runner.app Payload/
          zip -r secure_player_unsigned.ipa Payload
    artifacts:
      - build/ios/unsigned/secure_player_unsigned.ipa
      - build/ios/unsigned/*.xcresult
    triggering:
      events:
        - push

  ios-simulator-build:
    name: iOS Simulator build (for Appetize.io/LambdaTest/BrowserStack + Codemagic App Preview)
    max_build_duration: 60
    instance_type: mac_mini_m2
    environment:
      flutter: 3.41.9
    scripts:
      - name: Get Flutter packages
        script: flutter pub get
      - name: Install CocoaPods dependencies
        script: |
          cd ios && pod install

      # Simulator builds never need code signing at all — no Development
      # Team check to work around here, unlike the real-device workflow.
      # flutter build ios --simulator handles the whole xcodebuild
      # invocation itself cleanly for this target. --release is NOT an
      # option here: "Release mode is not supported for simulators" — the
      # Simulator only runs Debug/Profile JIT-compiled Dart, never AOT.
      - name: Flutter build (Simulator target)
        script: |
          flutter build ios --simulator --debug

      # Appetize.io/LambdaTest/BrowserStack expect a plain .zip containing
      # the .app bundle directly — not the Payload/ .ipa structure real
      # devices need.
      - name: Zip Runner.app for online simulator services
        script: |
          cd build/ios/iphonesimulator
          zip -r secure_player_simulator.zip Runner.app
    artifacts:
      - build/ios/iphonesimulator/secure_player_simulator.zip
      # Codemagic's own App Preview ("Quick Launch" in-browser simulator)
      # needs the raw, unzipped .app bundle declared directly here — it
      # doesn't unzip artifacts itself. The zip above stays for external
      # services (Appetize/BrowserStack) which want it pre-zipped.
      - build/ios/iphonesimulator/Runner.app
    triggering:
      events:
        - push

  ios-simulator-debug-flag-build:
    name: iOS Simulator build with debug security flag (for streaming-based test platforms)
    max_build_duration: 60
    instance_type: mac_mini_m2
    environment:
      flutter: 3.41.9
    scripts:
      - name: Get Flutter packages
        script: flutter pub get
      - name: Install CocoaPods dependencies
        script: |
          cd ios && pod install
      # DEBUG_SHOW_SECURITY_FLAG=true swaps the real opaque blackout for a
      # small red banner over still-visible content (see
      # security_guard_gate.dart). Exists specifically because Appetize.io/
      # LambdaTest/BrowserStack stream the Simulator's screen to your
      # browser, and that streaming may itself register as "capture" —
      # the real blackout would otherwise cover the whole session
      # permanently, with no way to tell a real detection from the
      # platform's own streaming triggering it. The banner still proves
      # detection fired, without hiding everything else.
      - name: Flutter build (Simulator target, debug security flag)
        script: |
          flutter build ios --simulator --debug --dart-define=DEBUG_SHOW_SECURITY_FLAG=true

      - name: Zip Runner.app for online simulator services
        script: |
          cd build/ios/iphonesimulator
          zip -r secure_player_simulator_debugflag.zip Runner.app
    artifacts:
      - build/ios/iphonesimulator/secure_player_simulator_debugflag.zip
    triggering:
      events:
        - push
