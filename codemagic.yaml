workflows:
  ios-unsigned-build:
    name: iOS unsigned build (for Sideloadly)
    max_build_duration: 60
    instance_type: mac_mini_m2
    environment:
      # Matches the local dev machine's version for consistency, though this
      # specific version number turned out not to be the actual fix for the
      # hashValues issue below — see that step's comment for the real cause.
      flutter: 3.41.9
    scripts:
      - name: Get Flutter packages
        script: flutter pub get
      - name: Install CocoaPods dependencies
        script: |
          cd ios && pod install

      # better_player 0.0.84's *pristine, unmodified* pub.dev release calls
      # the removed Dart API `hashValues()` in 4 files — a known upstream bug
      # (github.com/jhomlala/betterplayer#1326), fixed in newer Dart SDKs by
      # simply swapping in Object.hash() with the exact same argument order
      # (a 1:1 replacement, confirmed by reading the equivalent fixed code).
      # This project's local dev machine builds fine only because someone
      # manually patched these 4 files directly inside the machine-global
      # pub-cache at some point — invisible to git, absent from any tracked
      # project file, and would silently break again on a fresh machine or
      # after a `flutter pub cache repair`. Patched here deterministically
      # instead of relying on that undocumented local state.
      - name: Patch better_player hashValues -> Object.hash (upstream bug)
        script: |
          BP_DIR=$(find "$HOME/.pub-cache/hosted/pub.dev" -maxdepth 1 -iname "better_player-*" | head -1)
          echo "Patching better_player at: $BP_DIR"
          for f in drm_init_data.dart hls_track_metadata_entry.dart scheme_data.dart variant_info.dart; do
            FILE="$BP_DIR/lib/src/hls/hls_parser/$f"
            sed -i '' 's/hashValues(/Object.hash(/g' "$FILE"
          done

      # `flutter build ios --no-codesign` still enforces a Development Team
      # check for real-device (non-Simulator) targets — it only cleanly
      # skips signing for Simulator builds. This step's real job is just
      # Dart AOT compilation + plugin embedding + Xcode project prep, so its
      # own exit code is ignored; the actual unsigned build happens in the
      # next step via a direct xcodebuild invocation, which is the
      # documented, reliable way to get a real-device unsigned build.
      - name: Flutter prepare (Dart AOT + plugin embedding)
        script: |
          flutter build ios --release --no-codesign || true

      # No Apple Developer account involved at all. Sideloadly does the
      # actual signing later using whoever's own free Apple ID installs the
      # app — this only needs to produce a valid, unsigned real-device
      # binary. CONFIGURATION_BUILD_DIR pins the output to a known path
      # instead of relying on derivedData's default (unpredictable) location.
      - name: Xcode build (real device target, unsigned)
        script: |
          cd ios
          xcodebuild build \
            -workspace Runner.xcworkspace \
            -scheme Runner \
            -configuration Release \
            -sdk iphoneos \
            -destination "generic/platform=iOS" \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO \
            CONFIGURATION_BUILD_DIR="$CM_BUILD_DIR/build/ios/unsigned"

      # An .ipa is just a zip of a specific "Payload/" folder structure —
      # Sideloadly expects that exact structure, not a bare .app.
      - name: Package Runner.app into an unsigned .ipa
        script: |
          cd build/ios/unsigned
          mkdir -p Payload
          cp -r Runner.app Payload/
          zip -r secure_player_unsigned.ipa Payload
    artifacts:
      - build/ios/unsigned/secure_player_unsigned.ipa
      - build/ios/unsigned/*.xcresult
    triggering:
      events:
        - push

  ios-simulator-build:
    name: iOS Simulator build (for Appetize.io/LambdaTest/BrowserStack)
    max_build_duration: 60
    instance_type: mac_mini_m2
    environment:
      flutter: 3.41.9
    scripts:
      - name: Get Flutter packages
        script: flutter pub get
      - name: Install CocoaPods dependencies
        script: |
          cd ios && pod install

      # Same upstream better_player bug as the device workflow — this is a
      # Dart-source-level issue, unrelated to build target architecture.
      - name: Patch better_player hashValues -> Object.hash (upstream bug)
        script: |
          BP_DIR=$(find "$HOME/.pub-cache/hosted/pub.dev" -maxdepth 1 -iname "better_player-*" | head -1)
          echo "Patching better_player at: $BP_DIR"
          for f in drm_init_data.dart hls_track_metadata_entry.dart scheme_data.dart variant_info.dart; do
            FILE="$BP_DIR/lib/src/hls/hls_parser/$f"
            sed -i '' 's/hashValues(/Object.hash(/g' "$FILE"
          done

      # Simulator builds never need code signing at all — no Development
      # Team check to work around here, unlike the real-device workflow.
      # flutter build ios --simulator handles the whole xcodebuild
      # invocation itself cleanly for this target.
      - name: Flutter build (Simulator target)
        script: |
          flutter build ios --simulator --release

      # Appetize.io/LambdaTest/BrowserStack expect a plain .zip containing
      # the .app bundle directly — not the Payload/ .ipa structure real
      # devices need.
      - name: Zip Runner.app for online simulator services
        script: |
          cd build/ios/iphonesimulator
          zip -r secure_player_simulator.zip Runner.app
    artifacts:
      - build/ios/iphonesimulator/secure_player_simulator.zip
    triggering:
      events:
        - push
