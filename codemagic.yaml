workflows:
  ios-unsigned-build:
    name: iOS unsigned build (for Sideloadly)
    max_build_duration: 60
    instance_type: mac_mini_m2
    environment:
      flutter: stable
    scripts:
      - name: Get Flutter packages
        script: flutter pub get
      - name: Install CocoaPods dependencies
        script: |
          cd ios && pod install

      # No Apple Developer account involved at all — this deliberately skips
      # code signing entirely. Sideloadly does the actual signing later
      # using whoever's own free Apple ID installs the app, so this build
      # only needs to produce a valid, unsigned real-device binary.
      - name: Flutter build (release, real device target, unsigned)
        script: |
          flutter build ios --release --no-codesign

      # `flutter build ios` only produces the raw Runner.app bundle, not a
      # packaged .ipa. An .ipa is just a zip of a specific "Payload/" folder
      # structure — Sideloadly expects that exact structure, not a bare
      # .app, so it's packaged by hand here.
      - name: Package Runner.app into an unsigned .ipa
        script: |
          cd build/ios/iphoneos
          mkdir -p Payload
          cp -r Runner.app Payload/
          zip -r secure_player_unsigned.ipa Payload
    artifacts:
      - build/ios/iphoneos/secure_player_unsigned.ipa
      - build/ios/iphoneos/*.xcresult
    triggering:
      events:
        - push
